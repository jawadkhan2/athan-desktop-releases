<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athan</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="stack">
      <!-- ============ MAIN VIEW · Dynamic Sky ============ -->
      <section id="view-main" class="view widget">
        <div class="sky" id="sky">
          <svg class="arc" viewBox="0 0 390 210" preserveAspectRatio="none">
            <path d="M -10 200 Q 195 -30 400 200" />
          </svg>
          <div class="stars" id="stars"></div>

          <div class="sun" id="sun">
            <div class="cel-inner">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
            </div>
          </div>
          <div class="moon hide" id="moon">
            <div class="cel-inner">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            </div>
          </div>

          <div class="horizon"></div>

          <div class="sky-top" data-tauri-drag-region>
            <button class="icon-btn" id="gear" title="Settings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <div class="loc">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span id="city">—</span>
            </div>
            <button class="icon-btn" id="close" title="Close">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>

          <div class="sky-info">
            <div class="cur-name" id="curName">—</div>
            <div class="cur-time" id="curTime"></div>
          </div>
        </div>

        <div class="countbar" id="countbar">—</div>
        <div class="plist" id="plist"></div>
      </section>

      <!-- ============ SETTINGS VIEW · List Rows ============ -->
      <section id="view-settings" class="view widget">
        <div class="s-header" data-tauri-drag-region>
          <button class="icon-btn" id="back" title="Back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h1>Settings</h1>
        </div>

        <div class="s-list">
          <!-- Athan style -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg></div>
            <div class="s-meta"><div class="s-label">Athan style</div></div>
            <div class="s-ctl">
              <div class="dd" id="style-dd">
                <button class="dd-btn" id="style-dd-btn">
                  <span id="style-dd-val">—</span>
                  <svg class="chev" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4"/></svg>
                </button>
                <div class="dd-menu" id="style-dd-menu"></div>
              </div>
              <button class="play round" id="preview-style" title="Preview">
                <svg class="ic-play" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg class="ic-stop" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              </button>
            </div>
          </div>

          <!-- Dua after athan -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
            <div class="s-meta"><div class="s-label">Dua after athan</div></div>
            <div class="s-ctl">
              <label class="switch"><input type="checkbox" id="dua" /><span class="slider"></span></label>
              <button class="play round" id="preview-dua" title="Preview">
                <svg class="ic-play" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg class="ic-stop" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              </button>
            </div>
          </div>

          <!-- Volume -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>
            <div class="s-meta"><div class="s-label">Volume</div></div>
            <div class="s-ctl"><input type="range" id="volume" min="0" max="1" step="0.01" /></div>
          </div>

          <!-- Asr madhab -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2"/></svg></div>
            <div class="s-meta"><div class="s-label">Asr madhab</div></div>
            <div class="s-ctl">
              <div class="seg">
                <button data-madhab="shafi">Shafi</button>
                <button data-madhab="hanafi">Hanafi</button>
              </div>
            </div>
          </div>

          <!-- Location -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div class="s-meta"><div class="s-label">Location</div><div class="s-hint" id="loc-hint">—</div></div>
            <div class="s-ctl"><button class="play" id="redetect">Re-detect</button></div>
          </div>

          <!-- Launch on login -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5M15 12H3"/></svg></div>
            <div class="s-meta"><div class="s-label">Launch on login</div></div>
            <div class="s-ctl"><label class="switch"><input type="checkbox" id="autostart" /><span class="slider"></span></label></div>
          </div>

          <!-- Updates -->
          <div class="s-row">
            <div class="s-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9 9 0 0 0 6.36-2.64L21 16"/><path d="M21 21v-5h-5"/></svg></div>
            <div class="s-meta"><div class="s-label">Updates</div><div class="s-hint" id="update-hint">Version —</div></div>
            <div class="s-ctl"><button class="play" id="check-update">Check</button></div>
          </div>

        </div>
        <div class="s-foot-pad"></div>
      </section>
    </div>
  </body>
</html>
