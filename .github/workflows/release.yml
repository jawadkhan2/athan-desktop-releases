name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          # PAT with release write access to athan-desktop-releases
          # (code repo is private; releases live on the public repo)
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: jawadkhan2
          repo: athan-desktop-releases
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Athan ${{ inputs.tag || github.ref_name }}"
          releaseBody: "Download `Athan_x64-setup.exe` below to install. Existing installs update automatically."
          releaseDraft: false
          prerelease: false
