<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athan — Variant C · Dynamic Sky</title>
<style>
  :root {
    --orange:#ffb13c; --text:#f4fbff; --muted:#a6c5d1;
    font-family:"Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; display:grid; place-items:center; background:#06121a; padding:24px; }

  .widget {
    width:390px; border-radius:30px; overflow:hidden; color:var(--text);
    background: linear-gradient(180deg,#15485c,#0f3a4a);
    box-shadow: 0 30px 70px rgba(0,0,0,.55);
    animation: rise .6s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise { from{opacity:0; transform:translateY(20px) scale(.98);} to{opacity:1; transform:none;} }

  /* ---- Sky scene ---- */
  .sky {
    position:relative; height:210px; overflow:hidden;
    background: linear-gradient(180deg,#2a7ea0 0%, #1f6786 45%, #1a566e 100%);
  }
  .sky .horizon {
    position:absolute; left:0; right:0; bottom:0; height:46%;
    background: linear-gradient(180deg, transparent, rgba(8,30,40,.5));
  }
  /* sun travels a gentle arc */
  .sun {
    position:absolute; top:54px; left:60%;
    width:60px; height:60px; color:var(--orange);
    filter: drop-shadow(0 0 22px rgba(255,177,60,.85));
    animation: float 5s ease-in-out infinite;
  }
  .sun svg { animation: spin 26s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-7px);} }

  /* arc guide line */
  .arc { position:absolute; inset:0; width:100%; height:100%; }
  .arc path { fill:none; stroke: rgba(255,255,255,.18); stroke-width:2; stroke-dasharray:4 7; }

  /* floating particles */
  .p { position:absolute; border-radius:50%; background:rgba(255,255,255,.5); animation: rises linear infinite; }
  @keyframes rises {
    from { transform: translateY(0); opacity:0; }
    10% { opacity:.7; }
    to { transform: translateY(-220px); opacity:0; }
  }

  .sky-info { position:absolute; left:24px; bottom:18px; z-index:2; }
  .sky-info .cur-name { font-size:46px; font-weight:800; letter-spacing:1px; line-height:1; }
  .sky-info .cur-time { font-size:22px; font-weight:700; color:var(--orange); margin-top:4px; font-variant-numeric:tabular-nums; }
  .sky-top { position:absolute; top:0; left:0; right:0; z-index:3;
    display:flex; align-items:center; justify-content:space-between; padding:18px 20px; }
  .loc { display:flex; align-items:center; gap:8px; font-size:20px; font-weight:700; }
  .icon-btn { background:rgba(255,255,255,.12); border:none; color:var(--text); cursor:pointer;
    width:34px; height:34px; border-radius:50%; display:grid; place-items:center; transition:.25s; }
  .icon-btn:hover { background:rgba(255,255,255,.25); }
  #gear:hover { transform: rotate(90deg); }
  svg { display:block; }

  /* countdown banner */
  .countbar {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:12px; font-size:14px; color:var(--muted);
    background: rgba(0,0,0,.18);
    border-bottom:1px solid rgba(255,255,255,.07);
  }
  .countbar b { color:#ffd293; font-weight:700; font-variant-numeric:tabular-nums; }

  /* ---- list ---- */
  .list { padding:8px 14px 18px; }
  .prow {
    display:flex; align-items:center; gap:14px; padding:13px 12px; border-radius:14px;
    font-size:19px; position:relative; transition: background .25s;
    animation: fadeRow .5s both;
  }
  .prow:hover { background: rgba(255,255,255,.05); }
  .pname { flex:1; font-weight:500; }
  .ptime { font-weight:600; font-variant-numeric:tabular-nums; }
  .picon { width:28px; display:grid; place-items:center; }
  .prow.active { background: rgba(255,255,255,.08); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .prow.active::before { content:""; position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:4px; height:60%; border-radius:4px; background:var(--orange);
    box-shadow:0 0 10px rgba(255,177,60,.8); animation: pulseBar 2s ease-in-out infinite; }
  @keyframes pulseBar { 0%,100%{opacity:1;} 50%{opacity:.45;} }
  .prow:nth-child(1){animation-delay:.15s}.prow:nth-child(2){animation-delay:.22s}
  .prow:nth-child(3){animation-delay:.29s}.prow:nth-child(4){animation-delay:.36s}
  .prow:nth-child(5){animation-delay:.43s}
  @keyframes fadeRow { from{opacity:0; transform:translateX(-8px);} to{opacity:1; transform:none;} }
</style>
</head>
<body>
  <div class="widget">
    <div class="sky">
      <svg class="arc" viewBox="0 0 390 210" preserveAspectRatio="none">
        <path d="M -10 200 Q 195 -30 400 200" />
      </svg>
      <div class="sun">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </div>
      <div class="horizon"></div>

      <div class="sky-top">
        <button class="icon-btn" id="gear" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="loc">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Houston</span>
        </div>
        <button class="icon-btn" id="close" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="sky-info">
        <div class="cur-name">ASR</div>
        <div class="cur-time">4:56 PM</div>
      </div>
    </div>

    <div class="countbar">next · Maghrib in <b id="countdown">1h 9m</b></div>

    <div class="list" id="list"></div>
  </div>

<script>
  const ICONS = {
    sunrise:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8aa6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 2v7M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m8 6 4-4 4 4" stroke="#6f8dff"/></svg>',
    sun:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    sunset:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff8a73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 9V2M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m16 5-4 4-4-4" stroke="#ff6f57"/></svg>',
    moon:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b69cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  };
  const prayers = [
    { name:"Fajr", time:"5:03 AM", icon:"sunrise" },
    { name:"Dhuhr", time:"1:22 PM", icon:"sun" },
    { name:"Asr", time:"4:56 PM", icon:"sun", active:true },
    { name:"Maghrib", time:"8:21 PM", icon:"sunset" },
    { name:"Isha", time:"9:39 PM", icon:"moon" },
  ];
  const list=document.getElementById("list");
  prayers.forEach(p=>{const r=document.createElement("div");r.className="prow"+(p.active?" active":"");
    r.innerHTML=`<span class="picon">${ICONS[p.icon]}</span><span class="pname">${p.name}</span><span class="ptime">${p.time}</span>`;list.appendChild(r);});

  // particles
  const sky=document.querySelector(".sky");
  for(let i=0;i<14;i++){const d=document.createElement("div");d.className="p";
    const s=2+Math.random()*3;d.style.width=d.style.height=s+"px";
    d.style.left=Math.random()*100+"%";d.style.bottom="0";
    d.style.animationDuration=(6+Math.random()*7)+"s";d.style.animationDelay=(Math.random()*7)+"s";
    sky.appendChild(d);}

  const total=205*60; let remaining=(1*60+9)*60;
  const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h>0?`${h}h ${m}m`:(m>0?`${m}m ${x}s`:`${x}s`);};
  function tick(){document.getElementById("countdown").textContent=fmt(remaining);if(remaining>0)remaining--;}
  tick(); setInterval(tick,1000);
  document.getElementById("close").onclick=()=>document.querySelector(".widget").style.opacity=0.3;
</script>
</body>
</html>
