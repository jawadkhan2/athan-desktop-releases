<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athan — Variant A · Faithful</title>
<style>
  :root {
    --teal-1: #1f5d72;
    --teal-2: #15485c;
    --teal-3: #0f3a4a;
    --orange: #f5a623;
    --orange-soft: #f7b94e;
    --text: #ffffff;
    --muted: #a9c4cf;
    --row-active: rgba(255, 255, 255, 0.07);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0b0d10;
    padding: 24px;
  }

  .widget {
    width: 380px;
    border-radius: 28px;
    padding: 22px 24px 26px;
    color: var(--text);
    background:
      radial-gradient(120% 80% at 70% 0%, #246079 0%, transparent 60%),
      linear-gradient(160deg, var(--teal-1), var(--teal-2) 55%, var(--teal-3));
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    position: relative;
    overflow: hidden;
    animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .header .loc {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 21px;
    font-weight: 700;
  }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    transition: background 0.2s, transform 0.4s;
  }
  .icon-btn:hover { background: rgba(255, 255, 255, 0.12); }
  #gear:hover { transform: rotate(90deg); }
  svg { display: block; }

  /* ---- Hero (current prayer) ---- */
  .hero {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 8px;
  }
  .ring {
    position: relative;
    width: 104px;
    height: 104px;
    flex: none;
  }
  .ring svg { width: 104px; height: 104px; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: rgba(255, 255, 255, 0.12); stroke-width: 5; }
  .ring .prog {
    fill: none;
    stroke: var(--orange);
    stroke-width: 5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px rgba(245, 166, 35, 0.6));
    transition: stroke-dashoffset 1s linear;
  }
  .ring .sun-wrap {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }
  .sun {
    color: var(--orange);
    animation: spin 22s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hero-text { flex: 1; min-width: 0; }
  .hero-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .cur-name {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 1px;
    line-height: 1;
  }
  .cur-time {
    font-size: 28px;
    font-weight: 700;
    color: var(--orange-soft);
    font-variant-numeric: tabular-nums;
  }
  .cur-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
  }
  .cur-sub b { color: #d6e6ec; font-weight: 600; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
    margin: 18px 0 6px;
  }

  /* ---- Prayer list ---- */
  .list { display: flex; flex-direction: column; }
  .prow {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 12px;
    border-radius: 14px;
    position: relative;
    font-size: 19px;
    transition: background 0.25s;
    animation: fadeRow 0.5s both;
  }
  .prow:hover { background: rgba(255, 255, 255, 0.05); }
  .prow .pname { flex: 1; font-weight: 500; }
  .prow .ptime { font-weight: 600; font-variant-numeric: tabular-nums; color: #eef6f8; }
  .prow .picon { width: 28px; display: grid; place-items: center; }

  .prow.active {
    background: var(--row-active);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  }
  .prow.active::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 60%;
    border-radius: 4px;
    background: var(--orange);
    box-shadow: 0 0 10px rgba(245, 166, 35, 0.8);
    animation: pulseBar 2s ease-in-out infinite;
  }
  @keyframes pulseBar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }
  @keyframes fadeRow {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: none; }
  }
  /* stagger */
  .prow:nth-child(1){animation-delay:.15s}
  .prow:nth-child(2){animation-delay:.22s}
  .prow:nth-child(3){animation-delay:.29s}
  .prow:nth-child(4){animation-delay:.36s}
  .prow:nth-child(5){animation-delay:.43s}
</style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <button class="icon-btn" id="gear" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="loc">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="city">Houston</span>
      </div>
      <button class="icon-btn" id="close" title="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="hero">
      <div class="ring">
        <svg viewBox="0 0 104 104">
          <circle class="track" cx="52" cy="52" r="47" />
          <circle class="prog" id="prog" cx="52" cy="52" r="47" />
        </svg>
        <div class="sun-wrap">
          <svg class="sun" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </div>
      </div>
      <div class="hero-text">
        <div class="hero-top">
          <div class="cur-name" id="curName">ASR</div>
          <div class="cur-time" id="curTime">4:56 PM</div>
        </div>
        <div class="cur-sub">next · <b id="nextName">Maghrib</b> in <b id="countdown">1h 9m</b></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="list" id="list"></div>
  </div>

<script>
  const ICONS = {
    sunrise: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8aa6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 2v7M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m8 6 4-4 4 4" stroke="#6f8dff"/></svg>',
    sun:     '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    sunset:  '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff8a73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 9V2M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m16 5-4 4-4-4" stroke="#ff6f57"/></svg>',
    moon:    '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b69cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/><path d="M19 3v4M17 5h4" stroke="#cdbcff"/></svg>',
  };

  const prayers = [
    { name: "Fajr",    time: "5:03 AM", icon: "sunrise" },
    { name: "Dhuhr",   time: "1:22 PM", icon: "sun" },
    { name: "Asr",     time: "4:56 PM", icon: "sun", active: true },
    { name: "Maghrib", time: "8:21 PM", icon: "sunset" },
    { name: "Isha",    time: "9:39 PM", icon: "moon" },
  ];

  const list = document.getElementById("list");
  prayers.forEach(p => {
    const row = document.createElement("div");
    row.className = "prow" + (p.active ? " active" : "");
    row.innerHTML = `<span class="picon">${ICONS[p.icon]}</span>
      <span class="pname">${p.name}</span>
      <span class="ptime">${p.time}</span>`;
    list.appendChild(row);
  });

  // Animated progress ring + live countdown.
  const R = 47, CIRC = 2 * Math.PI * R;
  const prog = document.getElementById("prog");
  prog.style.strokeDasharray = CIRC;

  // Demo: Asr 4:56 PM -> Maghrib 8:21 PM (window 205 min). Pretend 1h9m left.
  const total = 205 * 60;       // seconds in current interval
  let remaining = (1 * 60 + 9) * 60; // 1h 9m

  function fmt(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return h > 0 ? `${h}h ${m}m` : (m > 0 ? `${m}m ${sec}s` : `${sec}s`);
  }
  function tick() {
    const elapsed = total - remaining;
    const frac = Math.min(1, Math.max(0, elapsed / total));
    prog.style.strokeDashoffset = CIRC * (1 - frac);
    document.getElementById("countdown").textContent = fmt(remaining);
    if (remaining > 0) remaining--;
  }
  tick();
  setInterval(tick, 1000);

  document.getElementById("close").onclick = () =>
    document.querySelector(".widget").style.opacity = 0.3;
</script>
</body>
</html>
