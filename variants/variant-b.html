<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athan — Variant B · Glass</title>
<style>
  :root {
    --orange: #ffb13c;
    --text: #f4fbff;
    --muted: #9fc1cf;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #07141a;
    padding: 24px;
    overflow: hidden;
  }

  /* animated aurora background behind the glass */
  .stage {
    position: relative;
    width: 390px;
    border-radius: 30px;
    padding: 3px;
    isolation: isolate;
  }
  .stage::before {
    content: "";
    position: absolute;
    inset: -40%;
    z-index: -1;
    background:
      radial-gradient(40% 40% at 20% 25%, #1c8aa6 0%, transparent 60%),
      radial-gradient(45% 45% at 80% 20%, #1f6f8b 0%, transparent 60%),
      radial-gradient(50% 50% at 60% 90%, #14586e 0%, transparent 60%),
      radial-gradient(35% 35% at 15% 85%, #2aa0b8 0%, transparent 60%);
    filter: blur(14px);
    animation: drift 16s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); }
    100% { transform: translate(4%, -3%) rotate(8deg) scale(1.08); }
  }

  .widget {
    border-radius: 28px;
    padding: 24px 24px 26px;
    color: var(--text);
    background: linear-gradient(160deg, rgba(30,82,102,0.72), rgba(16,52,66,0.78));
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 26px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.18);
    animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rise { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }

  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; }
  .loc { display:flex; align-items:center; gap:8px; font-size:21px; font-weight:700; }
  .icon-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); cursor:pointer;
    width:36px; height:36px; border-radius:50%;
    display:grid; place-items:center;
    transition: background .2s, transform .4s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.18); }
  #gear:hover { transform: rotate(120deg); }
  svg { display:block; }

  /* hero glass chip */
  .hero {
    display:flex; align-items:center; gap:18px;
    padding: 16px;
    border-radius: 22px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 18px;
  }
  .ring { position:relative; width:96px; height:96px; flex:none; }
  .ring svg.r { width:96px; height:96px; transform: rotate(-90deg); }
  .track { fill:none; stroke: rgba(255,255,255,0.14); stroke-width:6; }
  .prog  { fill:none; stroke: var(--orange); stroke-width:6; stroke-linecap:round;
           filter: drop-shadow(0 0 8px rgba(255,177,60,.7)); transition: stroke-dashoffset 1s linear; }
  .sun-wrap { position:absolute; inset:0; display:grid; place-items:center; }
  .sun { color: var(--orange); animation: spin 24s linear infinite, glow 3s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes glow { 0%,100%{ filter: drop-shadow(0 0 2px rgba(255,177,60,.4)); } 50%{ filter: drop-shadow(0 0 10px rgba(255,177,60,.9)); } }

  .hero-text { flex:1; min-width:0; }
  .hero-top { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .cur-name { font-size:38px; font-weight:800; letter-spacing:1px; line-height:1;
    background: linear-gradient(180deg,#fff,#cfe7ef); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .cur-time { font-size:26px; font-weight:700; color: var(--orange); font-variant-numeric: tabular-nums; }
  .cur-sub { margin-top:10px; font-size:14px; color: var(--muted); }
  .pill {
    display:inline-block; padding:2px 9px; border-radius:999px;
    background: rgba(255,177,60,0.16); color:#ffd293; font-weight:600;
    border:1px solid rgba(255,177,60,0.25);
  }

  .label { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin: 4px 4px 8px; }

  .list { display:flex; flex-direction:column; gap:6px; }
  .prow {
    display:flex; align-items:center; gap:14px;
    padding:12px 14px; border-radius:16px; font-size:18px;
    background: rgba(255,255,255,0.04);
    border:1px solid transparent;
    transition: transform .2s, background .2s, border-color .2s;
    animation: fadeRow .5s both;
  }
  .prow:hover { transform: translateX(4px); background: rgba(255,255,255,0.09); }
  .pname { flex:1; font-weight:500; }
  .ptime { font-weight:600; font-variant-numeric:tabular-nums; }
  .picon { width:28px; display:grid; place-items:center; }
  .prow.active {
    background: linear-gradient(90deg, rgba(255,177,60,0.18), rgba(255,177,60,0.02));
    border-color: rgba(255,177,60,0.4);
    box-shadow: 0 0 24px rgba(255,177,60,0.12);
  }
  .prow.active .pname { font-weight:700; }
  .prow:nth-child(1){animation-delay:.12s}.prow:nth-child(2){animation-delay:.19s}
  .prow:nth-child(3){animation-delay:.26s}.prow:nth-child(4){animation-delay:.33s}
  .prow:nth-child(5){animation-delay:.40s}
  @keyframes fadeRow { from{opacity:0; transform: translateY(8px);} to{opacity:1; transform:none;} }
</style>
</head>
<body>
  <div class="stage">
    <div class="widget">
      <div class="header">
        <button class="icon-btn" id="gear" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="loc">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Houston</span>
        </div>
        <button class="icon-btn" id="close" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="hero">
        <div class="ring">
          <svg class="r" viewBox="0 0 96 96"><circle class="track" cx="48" cy="48" r="42"/><circle class="prog" id="prog" cx="48" cy="48" r="42"/></svg>
          <div class="sun-wrap">
            <svg class="sun" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </div>
        </div>
        <div class="hero-text">
          <div class="hero-top">
            <div class="cur-name">ASR</div>
            <div class="cur-time">4:56 PM</div>
          </div>
          <div class="cur-sub">next · Maghrib in <span class="pill" id="countdown">1h 9m</span></div>
        </div>
      </div>

      <div class="label">Today</div>
      <div class="list" id="list"></div>
    </div>
  </div>

<script>
  const ICONS = {
    sunrise:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8aa6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 2v7M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m8 6 4-4 4 4" stroke="#6f8dff"/></svg>',
    sun:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    sunset:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff8a73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 9V2M4.2 10.2l1.4 1.4M1 18h2M21 18h2M18.4 11.6l1.4-1.4M23 22H1"/><path d="m16 5-4 4-4-4" stroke="#ff6f57"/></svg>',
    moon:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b69cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  };
  const prayers = [
    { name:"Fajr", time:"5:03 AM", icon:"sunrise" },
    { name:"Dhuhr", time:"1:22 PM", icon:"sun" },
    { name:"Asr", time:"4:56 PM", icon:"sun", active:true },
    { name:"Maghrib", time:"8:21 PM", icon:"sunset" },
    { name:"Isha", time:"9:39 PM", icon:"moon" },
  ];
  const list = document.getElementById("list");
  prayers.forEach(p=>{
    const r=document.createElement("div");
    r.className="prow"+(p.active?" active":"");
    r.innerHTML=`<span class="picon">${ICONS[p.icon]}</span><span class="pname">${p.name}</span><span class="ptime">${p.time}</span>`;
    list.appendChild(r);
  });

  const R=42, CIRC=2*Math.PI*R, prog=document.getElementById("prog");
  prog.style.strokeDasharray=CIRC;
  const total=205*60; let remaining=(1*60+9)*60;
  const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h>0?`${h}h ${m}m`:(m>0?`${m}m ${x}s`:`${x}s`);};
  function tick(){const frac=Math.min(1,Math.max(0,(total-remaining)/total));prog.style.strokeDashoffset=CIRC*(1-frac);document.getElementById("countdown").textContent=fmt(remaining);if(remaining>0)remaining--;}
  tick(); setInterval(tick,1000);
  document.getElementById("close").onclick=()=>document.querySelector(".widget").style.opacity=0.3;
</script>
</body>
</html>
